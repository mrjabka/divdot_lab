name: Bug report
description: Report incorrect behavior, broken output, or a failing command.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps, command, URL, or input that triggers the bug.
      placeholder: |
        1. Open ...
        2. Run pnpm ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste logs, screenshots, environment details, or relevant snippets.
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js, package manager, deployment target, or other relevant context.
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I can reproduce this on a current branch or release.
